<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Eventos Firebase</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:40px;
}

.contenedor{
    background:white;
    max-width:600px;
    margin:auto;
    padding:30px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>Nuevo Evento</h1>

<input type="date" id="fecha">

<input
type="text"
id="evento"
placeholder="Nombre del evento">

<input
type="text"
id="responsable"
placeholder="Responsable">

<button onclick="guardarEvento()">

Guardar Evento

</button>

</div>

<script type="module">

// ==========================
// FIREBASE
// ==========================

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// ==========================
// CONFIG
// ==========================

const firebaseConfig = {

  apiKey: "AIzaSyAisgbYj_b8aIsfSy1oxTRnKfy3RIxuG3Q",

  authDomain: "eventos-unity.firebaseapp.com",

  projectId: "eventos-unity",

  storageBucket: "eventos-unity.firebasestorage.app",

  messagingSenderId: "965083017990",

  appId: "1:965083017990:web:2fc275b9110023dab3a487",

  measurementId: "G-KQ0Y5CEPHW"

};

// ==========================
// INIT
// ==========================

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// ==========================
// GUARDAR EVENTO
// ==========================

window.guardarEvento =
async function(){

    const nuevoEvento = {

        fecha:
        document.getElementById("fecha").value,

        evento:
        document.getElementById("evento").value,

        responsable:
        document.getElementById("responsable").value

    };

    try{

        await addDoc(

            collection(db, "eventos"),

            nuevoEvento

        );

        alert(
        "Evento guardado 😄"
        );

    }catch(error){

        console.log(error);

        alert(
        "Error guardando"
        );

    }

}

</script>

</body>

</html>
