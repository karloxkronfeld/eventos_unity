<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Eventos GitHub</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:40px;
}

.contenedor{
    background:white;
    max-width:600px;
    margin:auto;
    padding:30px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>Nuevo Evento</h1>

<input type="date" id="fecha">

<input
type="text"
id="evento"
placeholder="Nombre del evento">

<input
type="text"
id="responsable"
placeholder="Responsable">

<button onclick="guardarEvento()">

Guardar Evento

</button>

</div>

<script>

async function guardarEvento(){

    const TOKEN =
    "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";

    const USUARIO =
    "karloxkronfeld";

    const REPO =
    "eventos_unity";

    const ARCHIVO =
    "eventos.json";

    const nuevoEvento = {

        fecha:
        document.getElementById("fecha").value,

        evento:
        document.getElementById("evento").value,

        responsable:
        document.getElementById("responsable").value

    };

    const url =

`https://api.github.com/repos/${USUARIO}/${REPO}/contents/${ARCHIVO}`;

    try{

        const respuesta = await fetch(url, {

            headers: {

                Authorization:
                `token ${TOKEN}`

            }

        });

        const data = await respuesta.json();

        console.log(data);

        const limpio =
        data.content.replace(/\n/g, "");

        const contenido =
        atob(limpio);

        let eventos =
        JSON.parse(contenido);

        eventos.push(nuevoEvento);

        const nuevoJSON =

        JSON.stringify(eventos, null, 4);

        const nuevoContenido =

        btoa(
            unescape(
                encodeURIComponent(nuevoJSON)
            )
        );

        const actualizar = await fetch(url, {

            method:"PUT",

            headers:{

                Authorization:
                `token ${TOKEN}`,

                "Content-Type":
                "application/json"

            },

            body:JSON.stringify({

                message:
                "Nuevo evento agregado",

                content:
                nuevoContenido,

                sha:
                data.sha

            })

        });

        const resultado =
        await actualizar.json();

        console.log(resultado);

        if(actualizar.ok){

            alert(
            "Evento guardado 😄"
            );

        }else{

            alert(
            "Error guardando"
            );

            console.log(resultado);

        }

    }catch(error){

        console.log(error);

        alert(
        "Error en consola"
        );

    }

}

</script>

</body>

</html>
