<script>

async function guardarEvento(){

    const TOKEN =
    "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";

    const USUARIO =
    "karloxkronfeld";

    const REPO =
    "eventos_unity";

    const ARCHIVO =
    "eventos.json";

    const nuevoEvento = {

        fecha:
        document.getElementById("fecha").value,

        evento:
        document.getElementById("evento").value,

        responsable:
        document.getElementById("responsable").value

    };

    const url =

`https://api.github.com/repos/${USUARIO}/${REPO}/contents/${ARCHIVO}`;

    try{

        // =========================
        // LEER JSON
        // =========================

        const respuesta = await fetch(url, {

            headers: {

                Authorization:
                `token ${TOKEN}`

            }

        });

        const data = await respuesta.json();

        console.log(data);

        // =========================
        // LIMPIAR BASE64
        // =========================

        const limpio =

        data.content.replace(/\n/g, "");

        // =========================
        // DECODIFICAR
        // =========================

        const contenido = atob(limpio);

        let eventos =
        JSON.parse(contenido);

        // =========================
        // AGREGAR EVENTO
        // =========================

        eventos.push(nuevoEvento);

        // =========================
        // NUEVO JSON
        // =========================

        const nuevoJSON =

        JSON.stringify(eventos, null, 4);

        // =========================
        // CONVERTIR A BASE64
        // =========================

        const nuevoContenido =

        btoa(unescape(encodeURIComponent(nuevoJSON)));

        // =========================
        // SUBIR
        // =========================

        const actualizar = await fetch(url, {

            method:"PUT",

            headers:{

                Authorization:
                `token ${TOKEN}`,

                "Content-Type":
                "application/json"

            },

            body:JSON.stringify({

                message:
                "Nuevo evento agregado",

                content:
                nuevoContenido,

                sha:
                data.sha

            })

        });

        const resultado =
        await actualizar.json();

        console.log(resultado);

        if(actualizar.ok){

            alert(
            "Evento guardado 😄"
            );

        }else{

            alert(
            "Error guardando"
            );

            console.log(resultado);

        }

    }catch(error){

        console.log(error);

        alert(
        "Error en consola"
        );

    }

}

</script>
