

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eventos GitHub</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:40px;
}

.contenedor{
    background:white;
    max-width:600px;
    margin:auto;
    padding:30px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>Nuevo Evento</h1>

<input type="date" id="fecha">

<input
type="text"
id="evento"
placeholder="Nombre del evento">

<input
type="text"
id="responsable"
placeholder="Responsable">

<button onclick="guardarEvento()">

Guardar Evento

</button>

</div>

<script>

async function guardarEvento(){

    // =========================
    // CONFIGURACIÓN GITHUB
    // =========================

    const TOKEN =
    "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";

    const USUARIO =
    "Karloxkronfeld";

    const REPO =
    "eventos_unity";

    const ARCHIVO =
    "eventos.json";

    // =========================
    // NUEVO EVENTO
    // =========================

    const nuevoEvento = {

        fecha:
        document.getElementById("fecha").value,

        evento:
        document.getElementById("evento").value,

        responsable:
        document.getElementById("responsable").value

    };

    // =========================
    // LEER JSON ACTUAL
    // =========================

    const url =

`https://api.github.com/repos/${USUARIO}/${REPO}/contents/${ARCHIVO}`;

    const respuesta = await fetch(url, {

        headers: {

            Authorization:
            `token ${TOKEN}`

        }

    });

    const data = await respuesta.json();

    // =========================
    // DECODIFICAR JSON
    // =========================

    const contenido =
    atob(data.content);

    let eventos =
    JSON.parse(contenido);

    // =========================
    // AGREGAR EVENTO
    // =========================

    eventos.push(nuevoEvento);

    // =========================
    // CONVERTIR A BASE64
    // =========================

    const nuevoContenido =

    btoa(
        JSON.stringify(eventos, null, 4)
    );

    // =========================
    // SUBIR NUEVO JSON
    // =========================

    const actualizar = await fetch(url, {

        method:"PUT",

        headers:{

            Authorization:
            `token ${TOKEN}`,

            "Content-Type":
            "application/json"

        },

        body:JSON.stringify({

            message:
            "Nuevo evento agregado",

            content:
            nuevoContenido,

            sha:
            data.sha

        })

    });

    if(actualizar.ok){

        alert("Evento guardado en GitHub 😄");

    }else{

        alert("Error");

        console.log(
            await actualizar.text()
        );

    }

}

</script>

</body>

</html>
